<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>삼성생명 뉴스</title>
  <style>
    body { font-family: sans-serif; max-width: 1100px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #003087; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #003087; color: white; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #ddd; vertical-align: top; }
    a { color: #003087; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .btn { background: #003087; color: white; border: none; padding: 10px 20px;
            font-size: 15px; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
  <h1>📰 삼성생명 뉴스 게시판</h1>
  <p>기준일: 2026년 04월 11일 | 총 1건 (스포츠 제외)</p>
  <button class="btn" onclick="downloadPDF()">📥 PDF 다운로드</button>
  <table id="news-table">
    <tr><th>날짜</th><th>언론사</th><th>제목</th><th>내용 요약</th></tr>
    
        <tr>
          <td style="white-space:nowrap">Sat, 11 Apr 2026</td>
          <td style="white-space:nowrap;color:#666;font-size:13px">spotvnews.co.kr</td>
          <td><a href="https://www.spotvnews.co.kr/news/articleView.html?idxno=809630" target="_blank">[오피셜] '패승승' 왕즈이, 또 안세영을 이길까…日 야마구치에 2-1 역전...</a></td>
          <td style="font-size:13px">'배드민턴 여제' 안세영(24, 삼성생명)을 정면으로 위협하기 시작한 중국의 간판 왕즈이(세계 2위)가 결국 고비를 넘겼다. 예상대로 결승까지 ...</td>
        </tr>
  </table>
  <script>
    function downloadPDF() {
      const el = document.getElementById('news-table');
      const opt = {
        margin: 10,
        filename: '삼성생명뉴스_2026년 04월 11일.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
      };
      html2pdf().set(opt).from(el).save();
    }
  </script>
</body>
</html>
